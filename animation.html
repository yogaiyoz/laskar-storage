<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" c>
<title>Animated UI Demo</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bgMove 12s ease infinite;
}

/* Background Animation */
@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating shapes */
.shape{
position:absolute;
border-radius:50%;
filter:blur(60px);
opacity:0.6;
animation:float 12s infinite ease-in-out;
}

.shape:nth-child(1){
width:300px;
height:300px;
background:#ff00cc;
top:-100px;
left:-100px;
}

.shape:nth-child(2){
width:350px;
height:350px;
background:#00ffe7;
bottom:-120px;
right:-120px;
animation-delay:4s;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-80px);}
100%{transform:translateY(0px);}
}

/* Glass Card */
.card{
position:relative;
width:380px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
box-shadow:0 20px 40px rgba(0,0,0,0.3);
text-align:center;
color:white;
animation:cardFade 1.2s ease;
}

@keyframes cardFade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Title */
.card h1{
font-size:28px;
margin-bottom:10px;
letter-spacing:1px;
animation:textGlow 2s infinite alternate;
}

@keyframes textGlow{
from{text-shadow:0 0 5px #fff;}
to{text-shadow:0 0 20px #00ffe7;}
}

/* Paragraph */
.card p{
opacity:0.8;
margin-bottom:25px;
}

/* Button */
.btn{
display:inline-block;
padding:12px 25px;
border-radius:30px;
background:linear-gradient(45deg,#ff00cc,#00ffe7);
color:white;
font-weight:bold;
text-decoration:none;
position:relative;
overflow:hidden;
transition:0.4s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 25px rgba(0,255,231,0.7);
}

/* Ripple Effect */
.btn::after{
content:"";
position:absolute;
width:300%;
height:300%;
top:50%;
left:50%;
background:rgba(255,255,255,0.2);
transform:translate(-50%,-50%) scale(0);
border-radius:50%;
transition:0.6s;
}

.btn:hover::after{
transform:translate(-50%,-50%) scale(1);
}

/* Animated border */
.card::before{
content:"";
position:absolute;
inset:-2px;
border-radius:20px;
background:linear-gradient(45deg,#ff00cc,#00ffe7,#ff00cc);
z-index:-1;
animation:borderRotate 6s linear infinite;
}

@keyframes borderRotate{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}

</style>
</head>

<body>

<div class="shape"></div>
<div class="shape"></div>

<div class="card">
<h1>Welcome</h1>
<p>Template HTML + CSS Animasi Kompleks</p>
<a href="#" class="btn">Mulai</a>
</div>

</body>
</html>
